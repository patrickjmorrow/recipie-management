{{- $fullName := include "recipie.fullname" . }}
{{- $backendSvc := include "recipie.backend.fullname" . }}
{{- $webSvc := include "recipie.web.fullname" . }}
{{- $docsSvc := include "recipie.docs.fullname" . }}
{{- $rustfsSvc := include "recipie.rustfs.fullname" . }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "recipie.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if .Values.ingress.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.certManager.clusterIssuer | quote }}
    {{- end }}
    # Recipe images can be large; allow sizeable uploads through the API host.
    nginx.ingress.kubernetes.io/proxy-body-size: "16m"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts: [{{ .Values.ingress.apiHost | quote }}]
      secretName: {{ $fullName }}-api-tls
    - hosts: [{{ .Values.ingress.appHost | quote }}]
      secretName: {{ $fullName }}-app-tls
    - hosts: [{{ .Values.ingress.docsHost | quote }}]
      secretName: {{ $fullName }}-docs-tls
    - hosts: [{{ .Values.ingress.s3Host | quote }}]
      secretName: {{ $fullName }}-s3-tls
  {{- end }}
  rules:
    # Backend API
    - host: {{ .Values.ingress.apiHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $backendSvc }}
                port:
                  number: {{ .Values.backend.service.port }}
    # React SPA (nginx → RustFS app bucket)
    - host: {{ .Values.ingress.appHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $webSvc }}
                port:
                  number: 80
    # MkDocs site (nginx → RustFS docs bucket)
    - host: {{ .Values.ingress.docsHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $docsSvc }}
                port:
                  number: 80
    # Public RustFS S3 endpoint (presigned image URLs are signed against this host)
    - host: {{ .Values.ingress.s3Host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $rustfsSvc }}
                port:
                  number: 9000
