apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "recipie.web.fullname" . }}
  labels:
    {{- include "recipie.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "recipie.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "recipie.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "recipie.web.fullname" . }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "recipie.web.fullname" . }}
  labels:
    {{- include "recipie.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    {{- include "recipie.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
