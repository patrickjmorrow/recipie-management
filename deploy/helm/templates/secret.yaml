{{- if .Values.secrets.create }}
{{- $corsOrigins := .Values.backend.env.corsOrigins | default (printf "[\"https://%s\"]" .Values.ingress.appHost) }}
---
# CNPG app-role credentials (basic-auth). CNPG bootstraps the owner from this.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "recipie.db.appSecretName" . }}
  labels:
    {{- include "recipie.labels" . | nindent 4 }}
    cnpg.io/reload: "true"
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.cnpg.owner | quote }}
  password: {{ .Values.secrets.dbPassword | quote }}
---
# RustFS root credentials (also used as the backend S3 keys).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "recipie.rustfs.secretName" . }}
  labels:
    {{- include "recipie.labels" . | nindent 4 }}
type: Opaque
stringData:
  RUSTFS_ROOT_USER: {{ .Values.rustfs.rootUser | quote }}
  RUSTFS_ROOT_PASSWORD: {{ .Values.rustfs.rootPassword | quote }}
---
# Backend environment secret.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "recipie.backend.secretName" . }}
  labels:
    {{- include "recipie.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "recipie.databaseUrl" . | quote }}
  S3_ACCESS_KEY: {{ .Values.rustfs.rootUser | quote }}
  S3_SECRET_KEY: {{ .Values.rustfs.rootPassword | quote }}
  JWT_SECRET_KEY: {{ .Values.secrets.jwtSecret | quote }}
  GOOGLE_CLIENT_ID: {{ .Values.secrets.googleClientId | quote }}
  CORS_ORIGINS: {{ $corsOrigins | quote }}
{{- end }}
