# ---------------------------------------------------------------------------
# recipie-management Helm chart values
#
# This chart deploys the full stack into a Kubernetes cluster:
#   - backend API (FastAPI)
#   - PostgreSQL via CloudNativePG  (operator must be pre-installed)
#   - RustFS object storage (standalone)
#   - nginx pods serving the SPA and docs from RustFS buckets
#   - ingress (nginx) with optional cert-manager TLS
# ---------------------------------------------------------------------------

# -------------------- Backend API --------------------
backend:
  replicaCount: 1
  image:
    # TODO: replace <dockerhub-user> with your Docker Hub namespace. Repo must be public.
    repository: docker.io/<dockerhub-user>/recipie-backend
    pullPolicy: IfNotPresent
    tag: "0.1.0"          # bump on every image push; avoid :latest in the cluster
  service:
    type: ClusterIP
    port: 8000
  env:
    ENVIRONMENT: production
    # Browser origins allowed by CORS. Defaults to the app host when empty.
    corsOrigins: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -------------------- PostgreSQL (CloudNativePG) --------------------
# Requires the CloudNativePG operator installed cluster-wide.
cnpg:
  enabled: true
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  database: recipie
  owner: recipie
  storage:
    size: 5Gi
    storageClass: ""   # "" → cluster default StorageClass

# -------------------- RustFS (standalone object storage) --------------------
rustfs:
  enabled: true
  image:
    repository: rustfs/rustfs
    tag: latest
    pullPolicy: IfNotPresent
  # Root credentials. Also used as the S3 access/secret keys by the backend.
  rootUser: rustfsadmin
  rootPassword: rustfsadmin
  # The rustfs image runs as uid/gid 10001. fsGroup makes the freshly
  # provisioned PVC group-owned + writable so RustFS can initialize /data.
  podSecurityContext:
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
  storage:
    size: 20Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -------------------- Buckets --------------------
# `images` stays private (served via presigned URLs); `app` and `docs` are
# given a public-read policy so the nginx pods can proxy them anonymously.
buckets:
  images: recipie       # private — recipe images (backend, presigned URLs)
  app: recipie-web      # public-read — React SPA assets
  docs: recipie-docs    # public-read — MkDocs site
  # Origins allowed by the bucket CORS policy (presigned image fetches).
  corsAllowedOrigins:
    - "*"

# -------------------- Static hosting (nginx → RustFS) --------------------
web:
  replicaCount: 1
  image:
    repository: nginx
    tag: "1.27-alpine"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

docs:
  replicaCount: 1
  image:
    repository: nginx
    tag: "1.27-alpine"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

# -------------------- Ingress --------------------
ingress:
  # Rancher RKE2 ships ingress-nginx → "nginx". If your cluster uses Traefik
  # (K3s default), change this to "traefik".
  className: nginx
  # sslip.io resolves <anything>.10.0.0.32.sslip.io → 10.0.0.32 (your node/LB IP).
  apiHost: api.recipies.10.0.0.32.sslip.io
  appHost: app.recipies.10.0.0.32.sslip.io
  docsHost: docs.recipies.10.0.0.32.sslip.io
  # Public S3 endpoint — presigned image URLs are signed against this host,
  # so the browser must be able to reach it directly.
  s3Host: s3.recipies.10.0.0.32.sslip.io
  # RustFS admin console (port 9001). Reachable through the ingress because
  # ingress-nginx routes to the pod IP (RustFS binds the pod interface, not
  # loopback, which is why `kubectl port-forward` is refused). Leave empty to
  # not expose the console.
  consoleHost: s3console.recipies.10.0.0.32.sslip.io
  annotations: {}
  tls:
    enabled: false       # plain HTTP for now; flip to true once cert-manager is set up
  certManager:
    # Name of a cert-manager ClusterIssuer used to issue per-host certs (when tls.enabled).
    clusterIssuer: letsencrypt-prod

# -------------------- Secrets --------------------
secrets:
  # true  → the chart creates Secrets for DB, RustFS, and backend env.
  # false → provide your own via existingSecret (must contain DATABASE_URL,
  #         S3_ACCESS_KEY, S3_SECRET_KEY, JWT_SECRET_KEY, GOOGLE_CLIENT_ID,
  #         CORS_ORIGINS). In this mode you typically run an external database,
  #         so also set cnpg.enabled=false (the CNPG bootstrap secret is not created).
  create: true
  existingSecret: ""
  # App-level secrets (only used when create=true).
  jwtSecret: "changeme-please-override"
  googleClientId: ""
  # Password for the CNPG app role (owner). Override in production.
  dbPassword: "changeme-please-override"
